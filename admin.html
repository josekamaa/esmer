<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esmer Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --teal: #00c9a7;
      --navy: #0a1628;
      --navy-mid: #111e35;
      --white: #f0f6ff;
      --muted: #6b88aa;
      --danger: #e05252;
      --card: rgba(26, 47, 78, 0.7);
      --border: rgba(255, 255, 255, 0.08);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      text-align: center;
    }
    .login-logo span {
      color: var(--teal);
    }
    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .tab-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 0.3rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: var(--navy-mid);
      color: var(--white);
    }
    .form-group {
      margin-bottom: 1.1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--teal);
    }
    .btn-full {
      width: 100%;
      background: var(--teal);
      color: var(--navy);
      border: none;
      padding: 0.85rem;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-full:hover {
      background: #009e85;
      transform: translateY(-2px);
    }
    .auth-msg {
      text-align: center;
      font-size: 0.82rem;
      margin-top: 1rem;
      color: var(--danger);
    }
    .auth-msg.ok {
      color: #2ecc71;
    }

    /* ── ADMIN SHELL ── */
    #admin-shell {
      display: none;
      min-height: 100vh;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 220px;
      background: rgba(17, 30, 53, 0.92);
      backdrop-filter: blur(16px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      z-index: 50;
    }
    .sidebar-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.2rem;
    }
    .sidebar-logo span {
      color: var(--teal);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--white);
    }
    .nav-item.active {
      background: rgba(0, 201, 167, 0.12);
      color: var(--teal);
      box-shadow: inset 3px 0 0 var(--teal);
    }
    .sidebar-bottom {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .main-content {
      margin-left: 220px;
      padding: 2rem 2.5rem;
      min-height: 100vh;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--white), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 0.4rem 1rem 0.4rem 0.6rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .user-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    .page {
      display: none;
      animation: fadeUp 0.4s ease both;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .card:hover {
      border-color: rgba(0, 201, 167, 0.15);
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.2rem;
      margin-bottom: 1.8rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.2rem;
      transition: 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 201, 167, 0.2);
    }
    .stat-card .sc-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .stat-card .sc-val {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.2rem;
      line-height: 1;
    }
    .chart-container {
      height: 200px;
      margin-top: 0.5rem;
    }

    /* ── STATUS ── */
    .status-display {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1.6rem;
      border-radius: 40px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .status-badge.open {
      background: rgba(0, 201, 167, 0.15);
      color: var(--teal);
      border: 1.5px solid rgba(0, 201, 167, 0.3);
    }
    .status-badge.closed {
      background: rgba(224, 82, 82, 0.12);
      color: var(--danger);
      border: 1.5px solid rgba(224, 82, 82, 0.25);
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }
    .open .status-dot {
      background: var(--teal);
    }
    .closed .status-dot {
      background: var(--danger);
      animation: none;
    }
    @keyframes blink {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.2;
      }
    }
    .toggle-switch {
      position: relative;
      width: 56px;
      height: 28px;
      cursor: pointer;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: rgba(224, 82, 82, 0.3);
      transition: 0.3s;
    }
    .toggle-switch input:checked+.toggle-track {
      background: rgba(0, 201, 167, 0.4);
    }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--danger);
      transition: 0.3s;
    }
    .toggle-switch input:checked~.toggle-thumb {
      transform: translateX(28px);
      background: var(--teal);
    }
    .status-msg-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--white);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 1rem;
    }
    .status-msg-input:focus {
      border-color: var(--teal);
    }
    .btn-save {
      background: var(--teal);
      color: var(--navy);
      border: none;
      padding: 0.65rem 1.6rem;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-save:hover {
      background: #009e85;
      transform: translateY(-2px);
    }

    /* ── POSTS ── */
    .posts-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .filter-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 0.4rem 1rem;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
    }
    .filter-tab.active {
      background: rgba(0, 201, 167, 0.12);
      border-color: var(--teal);
      color: var(--teal);
    }
    .btn-new {
      background: var(--teal);
      color: var(--navy);
      border: none;
      padding: 0.55rem 1.3rem;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-new:hover {
      background: #009e85;
      transform: translateY(-2px);
    }

    .post-form-card {
      background: var(--card);
      border: 1px solid rgba(0, 201, 167, 0.2);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .post-form-card.visible {
      display: block;
      animation: fadeUp 0.3s ease both;
    }
    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .pf-group {
      margin-bottom: 1rem;
    }
    .pf-group label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      font-weight: 600;
    }
    .pf-group input,
    .pf-group select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      color: var(--white);
      font-size: 0.88rem;
      outline: none;
    }
    .pf-group input:focus,
    .pf-group select:focus {
      border-color: var(--teal);
    }
    .pf-group select option {
      background: var(--navy-mid);
    }
    #editor-container {
      height: 180px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
    }
    .ql-toolbar.ql-snow {
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      background: rgba(255, 255, 255, 0.03);
    }
    .ql-container.ql-snow {
      border: 1px solid var(--border);
      border-radius: 0 0 10px 10px;
      font-family: 'DM Sans', sans-serif;
    }
    .ql-editor {
      color: var(--white);
    }
    .ql-editor.ql-blank::before {
      color: var(--muted);
    }
    .ql-snow .ql-stroke {
      stroke: var(--muted);
    }
    .ql-snow .ql-fill {
      fill: var(--muted);
    }
    .ql-snow .ql-picker-label {
      color: var(--muted);
    }
    .ql-snow .ql-picker-options {
      background: var(--navy-mid);
    }
    .form-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.65rem 1.4rem;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-cancel:hover {
      border-color: var(--muted);
      color: var(--white);
    }

    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .post-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: 0.2s;
    }
    .post-item:hover {
      border-color: rgba(0, 201, 167, 0.2);
      transform: translateX(4px);
    }
    .post-type-badge {
      padding: 0.25rem 0.8rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .post-type-badge.blog {
      background: rgba(0, 201, 167, 0.12);
      color: var(--teal);
    }
    .post-type-badge.ad {
      background: rgba(255, 107, 53, 0.12);
      color: #ff6b35;
    }
    .post-type-badge.announcement {
      background: rgba(255, 200, 0, 0.12);
      color: #ffd000;
    }
    .post-meta {
      flex: 1;
      min-width: 0;
    }
    .post-meta h4 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
    }
    .post-meta .post-excerpt {
      color: var(--muted);
      font-size: 0.82rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-date {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .post-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .pub-toggle {
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: 0.15s;
    }
    .pub-toggle.published {
      background: rgba(0, 201, 167, 0.1);
      border-color: rgba(0, 201, 167, 0.3);
      color: var(--teal);
    }
    .btn-del {
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(224, 82, 82, 0.2);
      background: transparent;
      color: var(--danger);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-del:hover {
      background: rgba(224, 82, 82, 0.1);
    }

    /* ── MESSAGES ── */
    .message-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      transition: 0.2s;
    }
    .message-item:hover {
      border-color: rgba(0, 201, 167, 0.2);
    }
    .message-header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .message-header strong {
      color: var(--white);
      font-size: 0.95rem;
    }
    .message-phone {
      color: var(--teal);
      font-size: 0.85rem;
    }
    .message-service {
      background: rgba(255, 255, 255, 0.06);
      padding: 0.1rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .message-date {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .message-body {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
      margin-top: 0.4rem;
    }
    .message-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.6rem;
    }

    /* ── TOAST ── */
    #admin-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.9rem 1.6rem;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    #admin-toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    #admin-toast.success {
      background: var(--teal);
      color: var(--navy);
    }
    #admin-toast.error {
      background: var(--danger);
      color: #fff;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .es-icon {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
    }
    .loading-line {
      height: 60px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.07) 50%, rgba(255, 255, 255, 0.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      margin-bottom: 0.8rem;
    }
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
        padding: 1rem 0.5rem;
      }
      .sidebar-logo,
      .nav-item span {
        display: none;
      }
      .main-content {
        margin-left: 60px;
        padding: 1.5rem;
      }
      .stats-row {
        grid-template-columns: 1fr 1fr;
      }
      .form-row-2 {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 480px) {
      .stats-row {
        grid-template-columns: 1fr;
      }
      .post-item {
        flex-direction: column;
        align-items: stretch;
      }
      .post-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <!-- ══ LOGIN ══ -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Esmer <span>Cyber</span> Admin</div>
      <div class="login-sub">Manage your shop from anywhere</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>
      <div id="tab-login">
        <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="admin@esmercyber.co.ke" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
        <button class="btn-full" id="login-btn" onclick="doLogin()">Sign In →</button>
      </div>
      <div id="tab-register" style="display:none">
        <div class="form-group"><label>Email</label><input type="email" id="r-email" placeholder="admin@esmercyber.co.ke" /></div>
        <div class="form-group"><label>Password (min 6 chars)</label><input type="password" id="r-pass" placeholder="Choose a strong password" /></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="r-pass2" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doRegister()" /></div>
        <button class="btn-full" id="reg-btn" onclick="doRegister()">Create Account →</button>
      </div>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>

  <!-- ══ ADMIN SHELL ══ -->
  <div id="admin-shell">
    <nav class="sidebar">
      <div class="sidebar-logo">Esmer <span>Cyber</span></div>
      <button class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">📊</span><span>Dashboard</span></button>
      <button class="nav-item" onclick="showPage('status')"><span class="nav-icon">🟢</span><span>Shop Status</span></button>
      <button class="nav-item" onclick="showPage('posts')"><span class="nav-icon">📝</span><span>Posts & Ads</span></button>
      <button class="nav-item" onclick="showPage('messages')"><span class="nav-icon">✉️</span><span>Messages</span></button>
      <div class="sidebar-bottom">
        <button class="nav-item" onclick="doLogout()"><span class="nav-icon">🚪</span><span>Sign Out</span></button>
      </div>
    </nav>

    <div class="main-content">
      <div class="top-bar">
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="user-chip"><div class="user-dot"></div><span id="user-email-display">admin</span></div>
      </div>

      <!-- Dashboard -->
      <div class="page active" id="page-dashboard">
        <div class="stats-row">
          <div class="stat-card"><div class="sc-label">Shop Status</div><div class="sc-val" id="stat-status">—</div></div>
          <div class="stat-card"><div class="sc-label">Total Posts</div><div class="sc-val" id="stat-posts">—</div></div>
          <div class="stat-card"><div class="sc-label">Published</div><div class="sc-val" id="stat-pub">—</div></div>
          <div class="stat-card"><div class="sc-label">Messages</div><div class="sc-val" id="stat-msgs">—</div></div>
        </div>
        <div class="card"><div class="card-title">📈 Posts per Day</div><div class="chart-container"><canvas id="postsChart"></canvas></div></div>
        <div class="card"><div class="card-title">📰 Recent Posts</div><div id="dash-posts-list"><div class="loading-line"></div><div class="loading-line"></div></div></div>
      </div>

      <!-- Status -->
      <div class="page" id="page-status">
        <div class="card">
          <div class="card-title">🟢 Shop Open / Closed</div>
          <div class="status-display">
            <div class="status-badge open" id="big-status-badge"><div class="status-dot"></div><span id="big-status-text">OPEN</span></div>
            <label class="toggle-switch"><input type="checkbox" id="status-toggle" onchange="saveStatus()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </div>
          <div class="pf-group"><label>Status Message</label><input class="status-msg-input" type="text" id="status-msg" placeholder="e.g. Open today until 8PM!" /></div>
          <button class="btn-save" onclick="saveStatus()">Save Status</button>
        </div>
        <div class="card">
          <div class="card-title">⏰ Hours Note</div>
          <div class="pf-group"><label>Special Hours / Holiday Notice</label><input class="status-msg-input" type="text" id="hours-note" placeholder="e.g. Closed on 25th Dec" /></div>
          <button class="btn-save" onclick="saveHoursNote()">Save Notice</button>
        </div>
      </div>

      <!-- Posts -->
      <div class="page" id="page-posts">
        <div class="posts-toolbar">
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterPosts('all',this)">All</button>
            <button class="filter-tab" onclick="filterPosts('blog',this)">Blog</button>
            <button class="filter-tab" onclick="filterPosts('ad',this)">Ads</button>
            <button class="filter-tab" onclick="filterPosts('announcement',this)">Announcements</button>
          </div>
          <button class="btn-new" onclick="togglePostForm(true)">+ New Post</button>
        </div>

        <div class="post-form-card" id="post-form-card">
          <h3 id="form-title">✍️ New Post</h3>
          <input type="hidden" id="edit-id" />
          <div class="form-row-2">
            <div class="pf-group"><label>Title</label><input type="text" id="pf-title" placeholder="Post title…" /></div>
            <div class="pf-group"><label>Type</label><select id="pf-type"><option value="blog">📰 Blog</option><option value="ad">📢 Ad</option><option value="announcement">📣 Announcement</option></select></div>
          </div>
          <div class="pf-group"><label>Content</label><div id="editor-container"></div></div>
          <div class="form-row-2">
            <div class="pf-group"><label>Image URL</label><input type="url" id="pf-image" placeholder="https://…" /></div>
            <div class="pf-group"><label>Publish?</label><select id="pf-published"><option value="true">✅ Yes</option><option value="false">📁 Draft</option></select></div>
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="savePost()">Save Post</button>
            <button class="btn-cancel" onclick="togglePostForm(false)">Cancel</button>
          </div>
        </div>

        <div class="posts-list" id="posts-list"><div class="loading-line"></div><div class="loading-line"></div></div>
      </div>

      <!-- Messages -->
      <div class="page" id="page-messages">
        <div class="card">
          <div class="card-title">✉️ Contact Messages <span id="msg-count" style="color:var(--teal);font-size:0.8rem;margin-left:auto;"></span></div>
          <div id="messages-list"><div class="loading-line"></div><div class="loading-line"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="admin-toast"></div>

  <script>
    // ── SUPABASE ──
    const SUPA_URL = 'https://avfnlkygxrfbjhvfoxog.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2Zm5sa3lneHJmYmpodmZveG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MzM4MjYsImV4cCI6MjA5NzMwOTgyNn0.QgzTKoDUWw5iFafdE4f8WTnY51m6oyw-0uLC4eJyvyY';
    const { createClient } = supabase;
    const sb = createClient(SUPA_URL, SUPA_KEY);

    let currentUser = null,
      allPosts = [],
      currentFilter = 'all',
      chartInstance = null,
      quill = null;

    // ── QUILL ──
    document.addEventListener('DOMContentLoaded', () => {
      quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Write your post content here…',
        modules: { toolbar: [{ 'header': [1, 2, 3, false] }, ['bold', 'italic', 'underline', 'strike'], ['blockquote'], [{ 'list': 'ordered' }, { 'list': 'bullet' }], ['link'], ['clean']] }
      });
    });

    // ── AUTH ──
    async function initAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (session?.user) enterAdmin(session.user);
      else { document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-shell').style.display = 'none'; }
    }

    function switchTab(tab) {
      document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('auth-msg').textContent = '';
    }

    async function doLogin() {
      const email = document.getElementById('l-email').value.trim(),
        pass = document.getElementById('l-pass').value;
      const btn = document.getElementById('login-btn');
      if (!email || !pass) return showAuthMsg('Please fill in all fields.');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      btn.disabled = false;
      btn.textContent = 'Sign In →';
      if (error) return showAuthMsg(error.message);
      enterAdmin(data.user);
    }

    async function doRegister() {
      const email = document.getElementById('r-email').value.trim(),
        pass = document.getElementById('r-pass').value,
        pass2 = document.getElementById('r-pass2').value;
      const btn = document.getElementById('reg-btn');
      if (!email || !pass) return showAuthMsg('Please fill in all fields.');
      if (pass !== pass2) return showAuthMsg('Passwords do not match.');
      if (pass.length < 6) return showAuthMsg('Password must be at least 6 characters.');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      const { data, error } = await sb.auth.signUp({ email, password: pass });
      btn.disabled = false;
      btn.textContent = 'Create Account →';
      if (error) return showAuthMsg(error.message);
      showAuthMsg('Account created! Check your email to confirm.', true);
    }

    async function doLogout() {
      await sb.auth.signOut();
      currentUser = null;
      document.getElementById('admin-shell').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }

    function showAuthMsg(msg, ok = false) {
      const el = document.getElementById('auth-msg');
      el.textContent = msg;
      el.className = 'auth-msg' + (ok ? ' ok' : '');
    }

    function enterAdmin(user) {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-shell').style.display = 'block';
      document.getElementById('user-email-display').textContent = user.email.split('@')[0];
      loadAll();
      subscribeRealtime();
    }

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      const map = ['dashboard', 'status', 'posts', 'messages'];
      document.querySelectorAll('.nav-item')[map.indexOf(name)].classList.add('active');
      document.getElementById('page-title').textContent = { dashboard: 'Dashboard', status: 'Shop Status', posts: 'Posts & Ads',
        messages: 'Messages' } [name];
    }

    async function loadAll() {
      await Promise.all([loadStatus(), loadPosts(), loadMessages()]);
      updateDashboard();
      updateChart();
    }

    // ── STATUS ──
    async function loadStatus() {
      const { data } = await sb.from('shop_status').select('*').eq('id', 1).single();
      if (!data) return;
      const isOpen = data.is_open;
      document.getElementById('status-toggle').checked = isOpen;
      document.getElementById('status-msg').value = data.message || '';
      document.getElementById('hours-note').value = data.hours_note || '';
      updateStatusBadge(isOpen);
      document.getElementById('stat-status').textContent = isOpen ? 'Open' : 'Closed';
      document.getElementById('stat-status').style.color = isOpen ? 'var(--teal)' : 'var(--danger)';
    }

    function updateStatusBadge(isOpen) {
      const badge = document.getElementById('big-status-badge');
      badge.className = 'status-badge ' + (isOpen ? 'open' : 'closed');
      document.getElementById('big-status-text').textContent = isOpen ? 'OPEN' : 'CLOSED';
    }

    async function saveStatus() {
      const isOpen = document.getElementById('status-toggle').checked;
      const msg = document.getElementById('status-msg').value;
      updateStatusBadge(isOpen);
      const { error } = await sb.from('shop_status').upsert({ id: 1, is_open: isOpen, message: msg, updated_at: new Date()
          .toISOString() });
      if (error) return toast('Failed to save status', 'error');
      toast('Shop status saved ✓', 'success');
    }

    async function saveHoursNote() {
      const note = document.getElementById('hours-note').value;
      const { error } = await sb.from('shop_status').upsert({ id: 1, hours_note: note });
      if (error) return toast('Failed to save notice', 'error');
      toast('Notice saved ✓', 'success');
    }

    // ── POSTS ──
    async function loadPosts() {
      const { data, error } = await sb.from('posts').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      if (error) return toast('Error loading posts', 'error');
      allPosts = data || [];
      renderPosts(allPosts);
      renderDashPosts(allPosts.slice(0, 5));
      updateDashboard();
      updateChart();
    }

    function filterPosts(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPosts(type === 'all' ? allPosts : allPosts.filter(p => p.type === type));
    }

    function renderPosts(posts) {
      const el = document.getElementById('posts-list');
      if (!posts.length) return el.innerHTML = `<div class="empty-state"><div class="es-icon">📭</div><p>No posts yet.</p></div>`;
      el.innerHTML = posts.map(p => `
        <div class="post-item">
          <span class="post-type-badge ${p.type}">${p.type}</span>
          <div class="post-meta">
            <h4>${esc(p.title)}</h4>
            <div class="post-excerpt">${esc(stripHtml(p.body))}</div>
            <div class="post-date">${new Date(p.created_at).toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'})}</div>
          </div>
          <div class="post-actions">
            <button class="pub-toggle ${p.is_published?'published':''}" onclick="togglePublish('${p.id}',${p.is_published})">${p.is_published?'Live':'Draft'}</button>
            <button class="btn-del" onclick="editPost('${p.id}')">✏️</button>
            <button class="btn-del" onclick="deletePost('${p.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function renderDashPosts(posts) {
      const el = document.getElementById('dash-posts-list');
      if (!posts.length) return el.innerHTML = `<div class="empty-state"><div class="es-icon">📭</div><p>No posts yet.</p></div>`;
      el.innerHTML = posts.map(p => `
        <div class="post-item">
          <span class="post-type-badge ${p.type}">${p.type}</span>
          <div class="post-meta"><h4>${esc(p.title)}</h4><div class="post-excerpt">${esc(stripHtml(p.body))}</div></div>
          <div class="post-actions"><span style="font-size:.78rem;color:${p.is_published?'var(--teal)':'var(--muted)'}">${p.is_published?'● Live':'○ Draft'}</span></div>
        </div>
      `).join('');
    }

    function updateDashboard() {
      document.getElementById('stat-posts').textContent = allPosts.length;
      document.getElementById('stat-pub').textContent = allPosts.filter(p => p.is_published).length;
    }

    function updateChart() {
      const ctx = document.getElementById('postsChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      const days = [],
        counts = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        days.push(key.slice(5));
        counts.push(allPosts.filter(p => p.created_at && p.created_at.startsWith(key)).length);
      }
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels: days, datasets: [{ label: 'Posts', data: counts, backgroundColor: 'rgba(0,201,167,0.6)',
            borderColor: '#00c9a7', borderWidth: 2, borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#6b88aa',
                font: { size: 12 } } } }, scales: { y: { ticks: { color: '#6b88aa', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } },
            x: { ticks: { color: '#6b88aa' }, grid: { display: false } } } }
      });
    }

    function togglePostForm(show, editData = null) {
      const form = document.getElementById('post-form-card');
      form.classList.toggle('visible', show);
      if (!show) {
        document.getElementById('edit-id').value = '';
        document.getElementById('pf-title').value = '';
        quill.root.innerHTML = '';
        document.getElementById('pf-image').value = '';
        document.getElementById('pf-type').value = 'blog';
        document.getElementById('pf-published').value = 'true';
        document.getElementById('form-title').textContent = '✍️ New Post';
        return;
      }
      if (editData) {
        document.getElementById('edit-id').value = editData.id;
        document.getElementById('pf-title').value = editData.title;
        quill.root.innerHTML = editData.body || '';
        document.getElementById('pf-image').value = editData.image_url || '';
        document.getElementById('pf-type').value = editData.type;
        document.getElementById('pf-published').value = String(editData.is_published);
        document.getElementById('form-title').textContent = '✏️ Edit Post';
      }
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function editPost(id) {
      const p = allPosts.find(x => x.id === id);
      if (p) togglePostForm(true, p);
    }

    async function savePost() {
      const title = document.getElementById('pf-title').value.trim();
      const body = quill.root.innerHTML;
      if (!title || !body || body === '<p><br></p>') return toast('Title and content are required', 'error');
      const id = document.getElementById('edit-id').value;
      const payload = { title, body, type: document.getElementById('pf-type').value, image_url: document.getElementById(
          'pf-image').value.trim() || null, is_published: document.getElementById('pf-published').value === 'true',
        user_id: currentUser.id };
      let error;
      if (id) ({ error } = await sb.from('posts').update(payload).eq('id', id).eq('user_id', currentUser.id));
      else ({ error } = await sb.from('posts').insert(payload));
      if (error) return toast('Failed to save: ' + error.message, 'error');
      toast(id ? 'Post updated ✓' : 'Post created ✓', 'success');
      togglePostForm(false);
      loadPosts();
    }

    async function togglePublish(id, current) {
      const { error } = await sb.from('posts').update({ is_published: !current }).eq('id', id).eq('user_id', currentUser.id);
      if (error) return toast('Failed to update', 'error');
      toast(!current ? 'Published ✓' : 'Drafted', 'success');
      loadPosts();
    }

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      const { error } = await sb.from('posts').delete().eq('id', id).eq('user_id', currentUser.id);
      if (error) return toast('Failed to delete', 'error');
      toast('Post deleted', 'success');
      loadPosts();
    }

    // ── MESSAGES ──
    async function loadMessages() {
      const { data, error } = await sb.from('messages').select('*').order('created_at', { ascending: false });
      if (error) return toast('Error loading messages', 'error');
      renderMessages(data || []);
      document.getElementById('stat-msgs').textContent = (data || []).length;
      document.getElementById('msg-count').textContent = `(${(data||[]).length})`;
    }

    function renderMessages(messages) {
      const el = document.getElementById('messages-list');
      if (!messages.length) return el.innerHTML =
        `<div class="empty-state"><div class="es-icon">📭</div><p>No messages yet.</p></div>`;
      el.innerHTML = messages.map(m => `
        <div class="message-item">
          <div class="message-header">
            <strong>${esc(m.name)}</strong>
            <span class="message-phone">📞 ${esc(m.phone)}</span>
            <span class="message-service">${esc(m.service)}</span>
            <span class="message-date">${new Date(m.created_at).toLocaleString('en-KE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <div class="message-body">${esc(m.message)}</div>
          <div class="message-actions">
            <button class="btn-del" onclick="deleteMessage('${m.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function deleteMessage(id) {
      if (!confirm('Delete this message?')) return;
      const { error } = await sb.from('messages').delete().eq('id', id);
      if (error) return toast('Failed to delete', 'error');
      toast('Message deleted', 'success');
      loadMessages();
    }

    // ── REALTIME ──
    function subscribeRealtime() {
      sb.channel('status').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'shop_status',
        filter: 'id=eq.1' }, () => loadStatus()).subscribe();
      sb.channel('posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts',
        filter: `user_id=eq.${currentUser.id}` }, () => loadPosts()).subscribe();
      sb.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () =>
        loadMessages()).subscribe();
    }

    // ── UTILS ──
    function esc(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function stripHtml(html) { const tmp = document.createElement('div');
      tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ''; }

    let toastTimer;

    function toast(msg, type = 'success') {
      const el = document.getElementById('admin-toast');
      el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
      el.className = `show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
    }

    initAuth();
  </script>
</body>
</html>
